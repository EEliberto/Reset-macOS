name: Reset!
options:
  bundleIdPrefix: com.reset
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.8.0
targets:
  Reset:
    type: application
    platform: macOS
    sources:
      - path: Sources/Reset
      - path: Resources/AgentIcons
        buildPhase: resources
      - path: Reset!.icon
        buildPhase: resources
    resources:
      - path: Resources/AgentIcons/antigravity.png
      - path: Resources/AgentIcons/chatgpt.png
      - path: Resources/AgentIcons/claude.png
      - path: Resources/AgentIcons/cursor.png
    dependencies:
      - package: Sparkle
        product: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        SUFeedURL: https://raw.githubusercontent.com/EEliberto/Reset-macOS/main/appcast.xml
        SUPublicEDKey: xPoz7tmmV7zrgnVeZL5zD7JvuEhvJUA+ofjsbupnguk=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 43200
        SUShowsReleaseNotes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reset.app
        PRODUCT_NAME: Reset!
        PRODUCT_MODULE_NAME: Reset
        MARKETING_VERSION: "270718"
        CURRENT_PROJECT_VERSION: "270718"
        ASSETCATALOG_COMPILER_APPICON_NAME: Reset!
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Resources/Info.plist
    scheme:
      testTargets:
        - ResetTests
  ResetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ResetTests
    dependencies:
      - target: Reset
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reset.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Reset!.app/Contents/MacOS/Reset!"
